version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20 || nvm install 20
        - node --version
        - npm --version
        - cd frontend
        - npm ci --legacy-peer-deps
    build:
      commands:
        - npm run build
  artifacts:
    # build가 frontend 폴더에서 실행되므로 out은 상대경로 out
    baseDirectory: out
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
